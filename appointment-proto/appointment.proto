syntax = "proto3";
package tutorial;

option go_package = "github.com/Animantra/advanced-programming-2/assingment1/appointmentservice/proto;proto";

service AppointmentService {
    rpc CreateAppointment(CreateAppointmentRequest) returns (AppointmentResponse);
    rpc GetAppointment(GetAppointmentRequest) returns (AppointmentResponse);
    rpc ListAppointments(ListAppointmentRequest) returns (ListAppointmentsResponse);
    rpc UpdateAppointmentStatus(UpdateStatusRequest) returns (AppointmentResponse);
}
message CreateAppointmentRequest {
    string title = 1;
    string description = 2;
    string doctor_id = 3;
}

message GetAppointmentRequest {
    string id = 1;
}

message ListAppointmentRequest {}

message UpdateStatusRequest {
    string id = 1;
    string status = 2;
}

message AppointmentResponse {
    string id = 1;
    string title = 2;
    string description = 3;
    string doctor_id = 4;
    string status = 5;
    string created_at = 6;
    string updated_at = 7;
}
message ListAppointmentsResponse { repeated AppointmentResponse appointments = 1; }